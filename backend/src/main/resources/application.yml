spring:
  application:
    name: campus-exchange
  datasource:
    url: jdbc:mysql://localhost:3306/campus_exchange?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 50MB

server:
  port: 8080
  address: 0.0.0.0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

jwt:
  secret: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZ2hpamtsbW5vcA==
  expiration: 86400000
  refresh-expiration: 604800000

minio:
  endpoint: http://192.168.0.21:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-goods: goods-images
  bucket-avatar: avatars
  bucket-verification: verification
  bucket-chat: chat-images

avatar:
  thumbnail-sizes:
    - 64
    - 128
    - 256
  quality: 0.8
  max-file-size: 5MB
